# target architecture - i386, amd64 or all
ARCH="amd64"

# base codename
BASECODENAME="mantic"

# base version
BASEVERSION="23.10"

# distribution version
VERSION="3.1"

# distribution channel
CHANNEL="stable"

# distribution name
NAME="Regolith Linux"

# mirror to fetch packages from
MIRROR_URL="http://archive.ubuntu.com/ubuntu/"
# MIRROR_URL="http://old-releases.ubuntu.com/ubuntu/"

# use HWE kernel and packages?
HWE_KERNEL="yes"
HWE_X11="no"

# suffix for generated .iso files
OUTPUT_SUFFIX=""

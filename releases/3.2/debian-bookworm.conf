# target architecture - i386, amd64 or all
ARCH="amd64"

# distro name
BASEDISTRO="debian"

# base codename
BASECODENAME="bookworm"

# base version
BASEVERSION="12.9" # TODO: is this correct value?

# distribution version
VERSION="3.2"

# distribution channel
CHANNEL="stable"

# distribution name
NAME="Regolith Linux"

# mirror to fetch packages from
MIRROR_URL="https://ftp.debian.org/debian/"

# use HWE kernel and packages?
HWE_KERNEL="no"
HWE_X11="no"

# suffix for generated .iso files
OUTPUT_SUFFIX=""

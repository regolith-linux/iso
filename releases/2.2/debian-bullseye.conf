# target architecture - i386, amd64 or all
ARCH="amd64"

# distro name
BASEDISTRO="debian"

# base codename
BASECODENAME="bullseye"

# base version
BASEVERSION="12.9"

# distribution version
VERSION="2.2"

# distribution channel
CHANNEL="stable"

# distribution name
NAME="Regolith"

# mirror to fetch packages from
MIRROR_URL="https://ftp.debian.org/debian/"

# use HWE kernel and packages?
HWE_KERNEL="yes"
HWE_X11="no"

# suffix for generated .iso files
OUTPUT_SUFFIX=""

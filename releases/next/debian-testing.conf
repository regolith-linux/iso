# target architecture - i386, amd64 or all
ARCH="amd64"

# distro name
BASEDISTRO="debian"

# base codename
BASECODENAME="testing"

# base version
BASEVERSION="13.0"

# distribution version
VERSION="next"

# distribution channel
CHANNEL="testing"

# distribution name
NAME="Regolith"

# mirror to fetch packages from
MIRROR_URL="http://ftp.debian.org/debian/"

# use HWE kernel and packages?
HWE_KERNEL="yes"
HWE_X11="no"

# suffix for generated .iso files
OUTPUT_SUFFIX="-alpha1"
